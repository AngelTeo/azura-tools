<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Daily MISC System v1775963922</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --g:#0f6e56;--g2:#085041;--g3:#d1fae5;--g4:#f0fdf9;--g5:#e8f5f1;
  --navy:#1a3a5c;--blue:#2d7dd2;
  --red:#a32d2d;--amb:#854f0b;
  --txt:#1a2533;--txt2:#4a5568;--mut:#8a96a8;
  --sur:#fff;--sur2:#f4f7f5;--bdr:#dde8e3;
  --r:14px;--rs:10px;
  --sh:0 1px 4px rgba(0,0,0,.07);--shm:0 8px 32px rgba(0,0,0,.12);
}
body{font-family:'DM Sans',sans-serif;background:var(--sur2);color:var(--txt);font-size:15px;min-height:100vh;}

/* ── SCREENS ── */
.scr{display:none;min-height:100vh;flex-direction:column;}
.scr.on{display:flex;}

/* ══════════════════════════════
   ENTRY SCREEN  (Image 2 style)
══════════════════════════════ */
#s-entry{background:var(--sur2);align-items:center;justify-content:center;padding:32px 20px;}
.entry-inner{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;}
.entry-icon{font-size:52px;margin-bottom:14px;line-height:1;}
.entry-title{font-size:24px;font-weight:700;color:var(--g);letter-spacing:-.4px;margin-bottom:4px;text-align:center;}
.entry-sub{font-size:13px;color:var(--mut);margin-bottom:32px;text-align:center;}
.entry-card{background:var(--sur);border-radius:20px;padding:28px 24px;width:100%;box-shadow:var(--shm);}
.entry-card label{font-size:14px;font-weight:600;color:var(--txt);display:block;margin-bottom:10px;}
.entry-card input{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:14px 16px;
  font-family:'DM Sans',sans-serif;font-size:16px;color:var(--txt);outline:none;transition:.2s;
  text-transform:uppercase;letter-spacing:2px;font-weight:600;background:var(--sur);}
.entry-card input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(15,110,86,.1);}
.entry-card input::placeholder{text-transform:none;letter-spacing:0;font-weight:400;color:var(--mut);}
.entry-main-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:var(--rs);
  padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  margin-top:16px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.entry-main-btn:active{background:var(--g2);}
.entry-divider{display:flex;align-items:center;gap:12px;margin:20px 0 0;width:100%;}
.entry-divider::before,.entry-divider::after{content:'';flex:1;height:.5px;background:var(--bdr);}
.entry-divider span{font-size:12px;color:var(--mut);white-space:nowrap;}
.entry-mgmt-link{font-size:13px;color:var(--mut);text-align:center;margin-top:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.entry-mgmt-link:hover{color:var(--navy);}
.pw-wrap{display:none;margin-top:12px;}
.pw-wrap input{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--txt);outline:none;transition:.2s;background:var(--sur);}
.pw-wrap input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(26,58,92,.1);}
.pw-login-btn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);
  padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;}
.pw-login-btn:active{background:#0f2a45;}
.pw-err{font-size:12px;color:var(--red);margin-top:6px;display:none;text-align:center;}

/* ── TEACHER APP ── */
.t-hdr{background:var(--g);padding:14px 16px;color:#fff;flex-shrink:0;}
.t-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.t-hdr h1{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.ini-badge{background:rgba(255,255,255,.18);border-radius:20px;padding:5px 12px;
  font-size:13px;font-weight:700;color:#fff;letter-spacing:1px;cursor:pointer;}
/* cat-tabs → .tab-strip */
.cat-tabs::-webkit-scrollbar{display:none;}
.tab-strip{display:flex;gap:6px;overflow-x:auto;padding:10px 14px 8px;
  background:var(--sur);border-bottom:.5px solid var(--bdr);flex-shrink:0;scrollbar-width:none;}
.tab-strip::-webkit-scrollbar{display:none;}
.xtab{flex-shrink:0;background:var(--sur2);border:1.5px solid var(--bdr);border-radius:20px;
  padding:7px 15px;font-size:12px;font-weight:600;color:var(--txt2);cursor:pointer;
  font-family:'DM Sans',sans-serif;white-space:nowrap;transition:.15s;}
.xtab.on{background:var(--g);color:#fff;border-color:var(--g);}
.xtab:hover:not(.on){border-color:var(--g);color:var(--g);}
.t-body{flex:1;overflow-y:auto;padding:14px 14px 24px;background:var(--sur2);}

/* FORMAT LIST */
.fmt-group{margin-bottom:4px;}
.fmt-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;
  cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);margin-bottom:8px;transition:.12s;}
.fmt-card:active{transform:scale(.98);background:var(--g4);}
.fmt-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.fmt-info{flex:1;min-width:0;}
.fmt-name{font-size:14px;font-weight:600;color:var(--txt);}
.fmt-desc{font-size:11px;color:var(--mut);margin-top:2px;}

/* ── FORM ── */
.form-hdr{background:var(--g);display:flex;align-items:center;gap:10px;padding:13px 14px;flex-shrink:0;}
.back-btn{background:rgba(255,255,255,.2);border:none;border-radius:8px;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:20px;flex-shrink:0;line-height:1;}
.back-btn:active{background:rgba(255,255,255,.35);}
.fh1{font-size:16px;font-weight:700;color:#fff;}
.fh2{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;}
.form-body{flex:1;overflow-y:auto;padding:14px 14px 100px;background:var(--sur2);}
.frow{margin-bottom:14px;}
.frow>label{font-size:12px;font-weight:600;color:var(--txt2);display:block;margin-bottom:6px;}
.req{color:var(--red);margin-left:2px;}
.frow input[type=text],.frow input[type=date],.frow input[type=time],.frow textarea,.frow select{
  width:100%;border:.5px solid var(--bdr);border-radius:var(--rs);padding:12px 13px;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--txt);background:var(--sur);outline:none;transition:.15s;}
.frow input:focus,.frow textarea:focus,.frow select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(15,110,86,.1);}
.frow textarea{resize:none;line-height:1.6;}
.hint{font-size:11px;color:var(--mut);margin-top:4px;line-height:1.5;}
.sec-div{font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.06em;
  padding:14px 0 8px;border-bottom:.5px solid var(--g3);margin-bottom:12px;}
.yn-row{display:flex;gap:8px;}
.yn-btn{flex:1;border:.5px solid var(--bdr);background:var(--sur);border-radius:var(--rs);
  padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;font-family:'DM Sans',sans-serif;color:var(--txt2);}
.yn-btn.y.on{background:#d1fae5;color:#065f46;border-color:#059669;}
.yn-btn.n.on{background:#fee2e2;color:#991b1b;border-color:#dc2626;}
.me-wrap{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px;margin-bottom:10px;box-shadow:var(--sh);}
.me-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.me-lbl{font-size:12px;font-weight:700;color:var(--g);}
.me-del{background:none;border:none;cursor:pointer;color:var(--mut);font-size:20px;line-height:1;}
.add-btn{width:100%;border:1.5px dashed var(--bdr);background:transparent;border-radius:var(--rs);
  padding:11px;font-size:13px;font-weight:600;color:var(--g);cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px;}
.add-btn:active{background:var(--g3);}

/* FORGOT ITEMS */
.stu-item-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px;margin-bottom:10px;box-shadow:var(--sh);}
.stu-item-card .sin{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sname{font-size:14px;font-weight:700;color:var(--txt);flex:1;}
.sdel{background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer;padding:0;}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.item-toggle{border:.5px solid var(--bdr);background:var(--sur2);border-radius:var(--rs);
  padding:9px 6px;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:.12s;
  font-family:'DM Sans',sans-serif;color:var(--txt2);line-height:1.3;}
.item-toggle.on{background:var(--g3);border-color:var(--g);color:#065f46;font-weight:700;}
.stu-add-row{display:flex;gap:8px;margin-bottom:12px;}
.stu-add-row input{flex:1;border:.5px solid var(--bdr);border-radius:var(--rs);padding:11px 12px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);background:var(--sur);outline:none;text-transform:uppercase;}
.stu-add-row input:focus{border-color:var(--g);}
.stu-add-row button{background:var(--g);border:none;border-radius:var(--rs);padding:11px 14px;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

/* GEN BAR */
.gen-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:.5px solid var(--bdr);padding:12px 14px;z-index:50;}
.gen-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:var(--r);padding:15px;
  font-size:16px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.gen-btn:active{background:var(--g2);}

/* PREVIEW */
.prev-hdr{background:var(--g);display:flex;align-items:center;gap:10px;padding:13px 14px;flex-shrink:0;}
.prev-body{flex:1;overflow-y:auto;padding:16px 14px 110px;background:var(--sur2);}
.msg-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:16px;
  font-family:'DM Mono',monospace;font-size:13px;line-height:1.9;white-space:pre-wrap;color:var(--txt);word-break:break-word;box-shadow:var(--sh);}
.send-bar{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:.5px solid var(--bdr);padding:12px 14px;display:flex;gap:8px;z-index:50;}
.wa-btn{flex:1;background:#25D366;color:#fff;border:none;border-radius:var(--r);padding:14px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.wa-btn:active{background:#1da851;}
.save-sys-btn{flex:1;background:#1a3a5c;color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.save-sys-btn:active{background:#0f2540;}
.fu-modal{background:#fff;border-radius:16px;padding:20px;max-width:360px;width:90%;margin:auto;}
.fu-chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
.fu-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--sur);font-size:13px;font-weight:600;cursor:pointer;color:var(--txt2);transition:.1s;}
.fu-chip.on{background:var(--g);color:#fff;border-color:var(--g);}
.fu-preview{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 12px;margin-top:10px;font-size:12px;color:#166534;line-height:1.8;}
.fu-label{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:14px;display:block;}
.fu-custom{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-top:4px;}
.fu-timeline{margin-top:12px;border-top:.5px solid var(--bdr);padding-top:12px;}
.fu-entry{display:flex;gap:8px;margin-bottom:8px;font-size:12px;}
.fu-entry-dot{width:8px;height:8px;border-radius:50%;background:var(--g);margin-top:3px;flex-shrink:0;}
.fu-entry-dot.init{background:var(--navy);}
.fu-entry-dot.fu{background:#7c3aed;}
.fu-entry-dot.closed{background:#059669;}
.fu-update-modal{background:#fff;border-radius:16px;padding:18px;max-width:340px;width:92%;margin:auto;}
.fu-status-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--sur2);font-size:12px;font-weight:600;cursor:pointer;color:var(--txt2);}
.fu-status-btn.on{background:var(--g);color:#fff;border-color:var(--g);}
.fu-wa-btn{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.copy-btn2{background:var(--sur2);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;font-size:20px;cursor:pointer;}
.copy-btn2:active{background:var(--bdr);}
.prev-note{font-size:11px;color:var(--mut);text-align:center;margin-top:10px;line-height:1.6;}

/* ── MGMT ── */
.m-nav{background:var(--navy);display:flex;align-items:center;padding:0 14px;height:50px;gap:2px;flex-shrink:0;}
.m-brand{font-size:13px;font-weight:700;color:#fff;margin-right:8px;white-space:nowrap;}
.m-tab{border:none;background:none;color:rgba(255,255,255,.55);padding:6px 10px;font-size:12px;
  cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:500;white-space:nowrap;}
.m-tab.on{background:rgba(255,255,255,.18);color:#fff;}
.m-logout{margin-left:auto;background:none;border:none;font-size:12px;color:rgba(255,255,255,.55);cursor:pointer;font-family:'DM Sans',sans-serif;padding:4px 8px;border-radius:6px;}
.m-logout:hover{background:rgba(255,255,255,.1);color:#fff;}
.m-page{display:none;flex:1;overflow-y:auto;padding:16px 14px 24px;max-width:900px;margin:0 auto;width:100%;}
.m-page.on{display:block;min-height:200px;}
/* ── Student search autocomplete ── */
.stu-wrap{position:relative;}
.stu-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--sur);border:.5px solid var(--g);border-radius:var(--rs);box-shadow:0 6px 20px rgba(0,0,0,.12);z-index:200;display:none;max-height:220px;overflow-y:auto;}
.stu-opt{padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500;border-bottom:.5px solid var(--bdr);}
.stu-opt:last-child{border-bottom:none;}
.stu-opt:hover,.stu-opt:active{background:var(--sur2);}
.stu-opt-cls{font-size:11px;font-weight:700;color:var(--g);background:var(--g)18;padding:2px 7px;border-radius:10px;}
/* ── Student profile panel ── */
.stu-profile{position:absolute;inset:0;background:var(--sur);z-index:300;overflow-y:auto;display:none;}
.stu-profile-hdr{display:flex;align-items:center;gap:12px;padding:14px;background:var(--sur);border-bottom:.5px solid var(--bdr);position:sticky;top:0;z-index:1;}
.stu-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0;}
.stu-rec-item{padding:12px 14px;border-bottom:.5px solid var(--bdr);cursor:default;}
.stu-rec-item:last-child{border-bottom:none;}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.dash-toprow{margin-bottom:10px;}
.dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
@media(max-width:640px){.dash-cols{grid-template-columns:1fr;}}
.dash-col{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px;box-shadow:var(--sh);}
.dash-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dash-col-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;}
.dash-badge{font-size:11px;font-weight:700;background:var(--amb);color:#fff;padding:2px 8px;border-radius:10px;}
.dash-section-lbl{font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.dash-empty-col{text-align:center;padding:24px 10px;color:var(--mut);}
.dash-empty-txt{font-size:12px;font-weight:600;color:var(--mut);}
@media(min-width:480px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
.stat{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);}
.stat .sv{font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-1px;line-height:1;}
.stat .sl{font-size:11px;color:var(--mut);margin-top:3px;}
.stat.red .sv{color:var(--red);}.stat.amb .sv{color:var(--amb);}.stat.grn .sv{color:var(--g);}
.rec{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden;cursor:pointer;transition:.12s;}
.rec-status-follow_up{border-left:3px solid #7c3aed;}
.rec-status-closed{border-left:3px solid #d1d5db;background:#f9fafb;}
.rec-status-open{border-left:3px solid transparent;}
.dash-col .rec{position:relative;z-index:1;}
.rec:hover{box-shadow:var(--shm);}
.rec-top{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;}
.rec-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.rec-type{font-size:13px;font-weight:600;color:var(--txt);}
.rec-meta{font-size:11px;color:var(--mut);margin-top:1px;}
.rec-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.bdg{display:inline-flex;align-items:center;border-radius:20px;padding:3px 9px;font-size:10px;font-weight:600;border:.5px solid transparent;}
.b-pend{background:#fff8e1;color:#854f0b;border-color:#f9cb42;}
.b-done{background:#e1f5ee;color:#0f6e56;border-color:#9fe1cb;}
.b-notif{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd;}
.b-no{background:#f1f5f9;color:#64748b;border-color:#cbd5e1;}
.ac-card{background:var(--sur);border:.5px solid var(--bdr);border-radius:var(--r);padding:11px 14px;margin-bottom:6px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px;cursor:pointer;}
.ac-card.urg{border-left:3px solid var(--red);}.ac-card.warn{border-left:3px solid var(--amb);}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--bdr);background:var(--sur);color:var(--txt2);white-space:nowrap;}
.chip.on{border-width:2px;}
.sw{position:relative;margin-bottom:12px;}
.sw input{width:100%;border:.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px 10px 34px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--txt);background:var(--sur);outline:none;}
.sw input:focus{border-color:var(--g);}
.sw::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;}
.plog{background:#f0f4f8;border:.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;max-height:130px;overflow-y:auto;margin-top:8px;display:none;}
.plog.on{display:block;}
.lok{color:#0f6e56;}.lwarn{color:#854f0b;}.lerr{color:#a32d2d;}
.prev-panel{display:none;margin-top:14px;}
.prev-panel.on{display:block;}
.pp-hdr{background:var(--navy);color:#fff;padding:10px 14px;border-radius:var(--r) var(--r) 0 0;display:flex;align-items:center;justify-content:space-between;}
.pp-body{border:.5px solid var(--navy);border-top:none;}
.pp-item{padding:12px 14px;border-bottom:.5px solid var(--bdr);}
.pp-item:last-child{border-bottom:none;}

const B='\u2980';
const H=(n,e='')=>`*${B}${B}${B}${B} ${n} ${B}${B}${B}${B}*`+(e?` ${e}`:'');
const BD=s=>`*${s}*`;
const today=()=>new Date().toISOString().slice(0,10);
const nowT=()=>{const d=new Date();return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const fd=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;};
const fds=iso=>{try{return new Date(iso+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}catch{return iso||'--';}};

function renderTeacher(cat){
  curCat=cat;
  const tabs=document.getElementById('cat-tabs');
  let th=`<button class="xtab ${cat==='ALL'?'on':''}" onclick="renderTeacher('ALL')">All</button>`;
  Object.keys(CATS).forEach(c=>{
   if(!FORMATS.some(f=>f.cat===c&&f.st))return;
   th+=`<button class="xtab ${cat===c?'on':''}" onclick="renderTeacher('${c}')">${CATS[c].icon} ${c}</button>`;
  });
  tabs.innerHTML=th;
  const fmts=(cat==='ALL'?FORMATS:FORMATS.filter(f=>f.cat===cat)).filter(f=>f.st);
  const body=document.getElementById('t-body');
  if(!fmts.length){body.innerHTML=`<div class="empty"><div class="eico">📭</div></div>`;return;}
  if(cat==='ALL'){
   let h='';
   Object.keys(CATS).forEach(c=>{
    const cf=FORMATS.filter(f=>f.cat===c&&f.st);if(!cf.length)return;
    const cm=CATS[c];
    h+=`<div style="font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.08em;padding:14px 0 8px;border-bottom:.5px solid var(--bdr);margin-bottom:10px;">${cm.icon} ${c}</div>`;
    cf.forEach(f=>h+=fmtCardHtml(f));
   });
   body.innerHTML=h;
  }else{
   body.innerHTML=fmts.map(fmtCardHtml).join('');
  }
}

    <div class="fmt-info"><div class="fmt-name">${f.label}</div><div class="fmt-desc">${f.desc}</div></div>
    <span style="color:var(--mut);font-size:18px;">›</span>
  </div>`;
}

function openForm(id,caller){
  curFmt=FORMATS.find(f=>f.id===id);if(!curFmt)return;
  formCaller=caller||'teacher';
  multiState={};forgotState={students:[],items:{}};
  const cm=CATS[curFmt.cat];
  document.getElementById('fh-title').textContent=curFmt.label;
  document.getElementById('fh-cat').textContent=curFmt.cat+' — '+curFmt.desc;
  document.getElementById('fh-ico').textContent=curFmt.icon;
  renderFields();show('s-form');window.scrollTo(0,0);
  // Show Generate+Save for MGMT only; hide Generate Message for MGMT
  const saveBtn=document.getElementById('gen-btn-save');
  const mainBtn=document.getElementById('gen-btn-main');
  if(saveBtn)saveBtn.style.display=formCaller==='mgmt'?'block':'none';
  if(mainBtn)mainBtn.style.display=formCaller==='mgmt'?'none':'block';
}
function renderFields(){
  let h='';
  const ini=getIni();
  let _skipMgmt=false;
  curFmt.fields.forEach(f=>{
   if(f.type==='section'){
    if(f.id==='_mgmt'&&formCaller==='teacher'){_skipMgmt=true;return;}
    if(!_skipMgmt)h+=`<div class="sec-div">${f.label}</div>`;
    return;
   }
   if(f.type==='multi'){h+=renderMultiBlock(f);return;}
   if(f.type==='forgot'){h+=renderForgotBlock();return;}
   if(_skipMgmt)return;
   h+=`<div class="frow"><label>${f.label}${f.req?`<span class="req"> *</span>`:''}</label>`;
   const def=(f.id==='reported'||f.id==='checked')?ini:(f.type==='date'?today():f.type==='time'?nowT():'');
   if(f.type==='student')h+=`<div class="stu-wrap"><input type="text" id="f_${f.id}" placeholder="Tap to search student…" readonly onclick="openStuPicker('f_${f.id}')" autocomplete="off" style="text-transform:uppercase;cursor:pointer;background:var(--sur);"></div>`;
   else if(f.type==='text')h+=`<input type="text" id="f_${f.id}" value="${esc(def)}" placeholder="${esc(f.ph||'')}" ${f.upper?'oninput="this.value=this.value.toUpperCase()"':''}>`;
   else if(f.type==='date')h+=`<input type="date" id="f_${f.id}" value="${today()}">`;
   else if(f.type==='time')h+=`<input type="time" id="f_${f.id}" value="${nowT()}">`;
   else if(f.type==='textarea')h+=`<textarea id="f_${f.id}" rows="${f.rows||3}" placeholder="${esc(f.ph||'')}"></textarea>`;
   else if(f.type==='select'){h+=`<select id="f_${f.id}"><option value="">— Select —</option>`;(f.opts||[]).forEach(o=>h+=`<option>${o}</option>`);h+=`</select>`;}
   else if(f.type==='yn'){h+=`<div class="yn-row"><button class="yn-btn y" id="f_${f.id}_Y" onclick="setYN('${f.id}','Y')">✓ Yes</button><button class="yn-btn n" id="f_${f.id}_N" onclick="setYN('${f.id}','N')">✕ No</button></div>`;}
   if(f.hint)h+=`<div class="hint">${f.hint}</div>`;
   h+=`</div>`;
  });
  document.getElementById('form-body').innerHTML=h;
}
function renderMultiBlock(f){
  if(!multiState[f.id])multiState[f.id]=[mkEntry(f)];
  let h=`<div id="mb_${f.id}">`;
  multiState[f.id].forEach((e,i)=>h+=renderEntry(f,e,i));
  h+=`</div><button class="add-btn" onclick="addEntry('${f.id}')">＋ ${f.addLabel||'Add'}</button>`;
  return h;
}
function mkEntry(f){const e={};(f.sub||[]).forEach(s=>e[s.id]='');return e;}
function renderEntry(f,entry,idx){
  let h=`<div class="me-wrap" id="me_${f.id}_${idx}"><div class="me-hdr"><span class="me-lbl">Entry #${idx+1}</span>${multiState[f.id].length>1?`<button class="me-del" onclick="removeEntry('${f.id}',${idx})">×</button>`:''}</div>`;
  (f.sub||[]).forEach(s=>{
   h+=`<div class="frow"><label>${s.label}${s.req?`<span class="req"> *</span>`:''}</label>`;
   if(s.type==='yn'){
    const yO=entry[s.id]==='Y'?'on':'';const nO=entry[s.id]==='N'?'on':'';
    h+=`<div class="yn-row"><button class="yn-btn y ${yO}" id="me_${f.id}_${idx}_${s.id}_Y" onclick="setMeYN('${f.id}',${idx},'${s.id}','Y')">✓ Yes</button><button class="yn-btn n ${nO}" id="me_${f.id}_${idx}_${s.id}_N" onclick="setMeYN('${f.id}',${idx},'${s.id}','N')">✕ No</button></div>`;
   }else if(s.type==='time'){
    h+=`<input type="time" id="me_${f.id}_${idx}_${s.id}" value="${entry[s.id]||''}" onchange="syncMe('${f.id}',${idx},'${s.id}',this.value)">`;
   }else if(s.type==='student'){
    h+=`<div class="stu-wrap"><input type="text" id="me_${f.id}_${idx}_${s.id}" placeholder="Tap to search student…" readonly onclick="openStuPicker('me_${f.id}_${idx}_${s.id}')" autocomplete="off" style="text-transform:uppercase;cursor:pointer;background:var(--sur);"></div>`;
   }else{
    h+=`<input type="text" id="me_${f.id}_${idx}_${s.id}" value="${esc(entry[s.id]||'')}" placeholder="${esc(s.ph||'')}" ${s.upper?`oninput="this.value=this.value.toUpperCase();syncMe('${f.id}',${idx},'${s.id}',this.value)"`:` oninput="syncMe('${f.id}',${idx},'${s.id}',this.value)"`}>`;
   }
   h+=`</div>`;
  });
  return h+`</div>`;
}
function syncMe(fid,idx,sid,v){if(multiState[fid]&&multiState[fid][idx])multiState[fid][idx][sid]=v;}
function syncAllMe(fid){
  const f=curFmt.fields.find(x=>x.id===fid&&x.type==='multi');if(!f)return;
  multiState[fid].forEach((e,i)=>(f.sub||[]).forEach(s=>{if(s.type==='yn')return;const el=document.getElementById(`me_${fid}_${i}_${s.id}`);if(el)e[s.id]=el.value;}));
}
function addEntry(fid){
  syncAllMe(fid);const f=curFmt.fields.find(x=>x.id===fid&&x.type==='multi');if(!f)return;
  multiState[fid].push(mkEntry(f));
  let h='';multiState[fid].forEach((e,i)=>h+=renderEntry(f,e,i));
  document.getElementById('mb_'+fid).innerHTML=h;
}
function removeEntry(fid,idx){
  syncAllMe(fid);multiState[fid].splice(idx,1);
  const f=curFmt.fields.find(x=>x.id===fid&&x.type==='multi');
  let h='';multiState[fid].forEach((e,i)=>h+=renderEntry(f,e,i));
  document.getElementById('mb_'+fid).innerHTML=h;
}
function setMeYN(fid,idx,sid,val){
  if(multiState[fid]&&multiState[fid][idx])multiState[fid][idx][sid]=val;
  document.getElementById(`me_${fid}_${idx}_${sid}_Y`)?.classList.toggle('on',val==='Y');
  document.getElementById(`me_${fid}_${idx}_${sid}_N`)?.classList.toggle('on',val==='N');
}
function setYN(id,val){
  document.getElementById(`f_${id}_Y`)?.classList.toggle('on',val==='Y');
  document.getElementById(`f_${id}_N`)?.classList.toggle('on',val==='N');
  let h=document.getElementById(`f_${id}_val`);
  if(!h){h=document.createElement('input');h.type='hidden';h.id=`f_${id}_val`;document.getElementById('form-body').appendChild(h);}
  h.value=val;
}
function getYN(id){
  const h=document.getElementById(`f_${id}_val`);if(h&&h.value)return h.value;
  return document.getElementById(`f_${id}_Y`)?.classList.contains('on')?'Y':document.getElementById(`f_${id}_N`)?.classList.contains('on')?'N':'—';
}
function renderForgotBlock(){
  const prog=document.getElementById('f_prog')?.value||'SRK';
  const items=FORGOT_ITEMS[prog]||[];
  return`<div id="forgot-block"><div class="sec-div">STUDENTS — ADD THEN TAP WHAT THEY FORGOT</div>
    <div class="stu-add-row"><input type="text" id="stu-nn" placeholder="Type student name…" onkeydown="if(event.key==='Enter')addFS()"><button onclick="addFS()">Add</button></div>
    <div id="fs-list">${renderFSList(items)}</div></div>`;
}
function renderFSList(items){
  if(!items)items=FORGOT_ITEMS[document.getElementById('f_prog')?.value||'SRK']||[];
  return forgotState.students.map((stu,i)=>`<div class="stu-item-card">
    <div class="sin"><div class="sname">${esc(stu)}</div><button class="sdel" onclick="removeFS(${i})">×</button></div>
    <div class="items-grid">${items.map(item=>`<button class="item-toggle ${(forgotState.items[stu]||[]).includes(item)?'on':''}" onclick="toggleFI('${esc(stu)}','${esc(item)}')">${item}</button>`).join('')}</div>
  </div>`).join('');
}
function addFS(){
  const inp=document.getElementById('stu-nn');
  const n=inp.value.trim().toUpperCase();if(!n)return;
  if(forgotState.students.includes(n)){toast('Already added',true);return;}
  forgotState.students.push(n);forgotState.items[n]=[];inp.value='';
  document.getElementById('fs-list').innerHTML=renderFSList();
}
function removeFS(idx){
  const n=forgotState.students[idx];forgotState.students.splice(idx,1);delete forgotState.items[n];
  document.getElementById('fs-list').innerHTML=renderFSList();
}
function toggleFI(stu,item){
  if(!forgotState.items[stu])forgotState.items[stu]=[];
  const arr=forgotState.items[stu];const i=arr.indexOf(item);
  if(i>=0)arr.splice(i,1);else arr.push(item);
  document.getElementById('fs-list').innerHTML=renderFSList();
}
function collectVals(){
  const v={};
  curFmt.fields.forEach(f=>{
   if(f.type==='section')return;
   if(f.type==='multi'){syncAllMe(f.id);v[f.id]=multiState[f.id]||[];}
   else if(f.type==='forgot'){
    const m={};
    forgotState.students.forEach(stu=>(forgotState.items[stu]||[]).forEach(item=>{if(!m[item])m[item]=[];m[item].push(stu);}));
    v.forgot=m;v.prog=document.getElementById('f_prog')?.value||'SRK';
   }
   else if(f.type==='yn')v[f.id]=getYN(f.id);
   else{const el=document.getElementById('f_'+f.id);v[f.id]=el?el.value:'';}
  });
  return v;
}

// ── Direct Save to System (MGMT) ──
function extractStudentsFromForm(){
  // Extract student names directly from form fields (faster than parsing raw text)
  const students=new Set();
  if(!curFmt)return[];
  // Top-level student fields
  curFmt.fields.forEach(f=>{
    if(f.type==='student'){
      const el=document.getElementById('f_'+f.id);
      const val=el?el.value.trim().toUpperCase():'';
      if(val.length>2)students.add(val);
    }
    if(f.type==='multi'){
      const entries=multiState[f.id]||[];
      entries.forEach(e=>{
        if(e.name&&e.name.trim().length>2)students.add(e.name.trim().toUpperCase());
      });
    }
  });
  return[...students];
}

function saveDirectly(){
  if(!curMsg||!curFmt)return;

    id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
    type:curFmt.id,
    cat:curFmt.cat,
    raw:curMsg,
    date:recDate,
    students:students,

    parentNotified:false,

    status:'open',

function renderDash(){
  const tod=today();
  const todR=S.records.filter(r=>r.date===tod).sort((a,b)=>b.createdAt-a.createdAt);
  // Follow-up Needed: status=follow_up with date due, OR older open records
  const pend=S.records.filter(r=>{
    const st=r.status||'open';
    if(st==='closed')return false;
    if(st==='follow_up'){
      // Show if followUpDate is today or past
      if(!r.followUpDate)return true;
      return r.followUpDate<=tod;
    }
    return r.date&&r.date<tod;
  });
  const urg=pend.filter(r=>['HEALTH','INJURED','COMPLAINT'].includes(r.type));
  const oth=pend.filter(r=>!urg.includes(r));
  const allPend=[...urg,...oth];

  let h=``;

  // ── Date pill + Stats row ──
  h+=`<div class="dash-toprow">
    <div class="tpill">📅 ${fdl(tod)}</div>
  </div>
  <div class="stat-grid">
    <div class="stat"><div class="sv">${todR.length}</div><div class="sl">Today</div></div>
    <div class="stat ${pend.length>0?'amb':'grn'}"><div class="sv">${pend.length}</div><div class="sl">Pending</div></div>
    <div class="stat ${urg.length>0?'red':''}"><div class="sv">${urg.length}</div><div class="sl">Urgent</div></div>
    <div class="stat"><div class="sv">${S.records.length}</div><div class="sl">Total</div></div>
  </div>`;

  // ── Two-column layout ──
  h+=`<div class="dash-cols">`;

  // LEFT: Today's Reports
  // Sort: open/follow_up first, closed last
  const todOpen=todR.filter(r=>(r.status||'open')!=='closed');
  const todClosed=todR.filter(r=>(r.status||'open')==='closed');
  const todSorted=[...todOpen,...todClosed];
  const openCount=todOpen.length;
  const closedCount=todClosed.length;
  h+=`<div class="dash-col">
    <div class="dash-col-hdr">
      <span class="dash-col-title">📋 Today's Reports</span>
      <button class="btn btn-sm" onclick="mGoPage('records')">All →</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      ${openCount?`<span style="font-size:10px;font-weight:700;color:#d97706;background:#fef3c7;padding:2px 8px;border-radius:8px;">○ ${openCount} open</span>`:''}
      ${closedCount?`<span style="font-size:10px;font-weight:700;color:#059669;background:#d1fae5;padding:2px 8px;border-radius:8px;">✅ ${closedCount} closed</span>`:''}
    </div>`;
  if(todR.length){
    todSorted.slice(0,8).forEach(r=>h+=recCard(r));
  }else{
    h+=`<div class="dash-empty-col"><div style="font-size:28px;margin-bottom:8px;">📋</div><div class="dash-empty-txt">No reports today</div></div>`;
  }
  h+=`</div>`;

  // RIGHT: Follow-up Needed
  h+=`<div class="dash-col">
    <div class="dash-col-hdr">
      <span class="dash-col-title">🟡 Follow-up Needed</span>
      ${allPend.length?`<span class="dash-badge">${allPend.length}</span>`:''}
    </div>`;
  if(urg.length){
    h+=`<div class="dash-section-lbl">🔴 Urgent</div>`;
    urg.slice(0,4).forEach(r=>h+=acCard(r,'urg'));
  }
  if(oth.length){
    if(urg.length)h+=`<div class="dash-section-lbl" style="margin-top:10px;">🟡 Pending</div>`;
    oth.slice(0,4).forEach(r=>h+=acCard(r,'warn'));
  }
  if(!allPend.length){
    h+=`<div class="dash-empty-col"><div style="font-size:28px;margin-bottom:8px;">✅</div><div class="dash-empty-txt">All caught up!</div></div>`;
  }
  h+=`</div>`;
  h+=`</div>`; // end dash-cols

  // ── Follow Up Calendar (full width) ──
  h+=`<div class="dash-col-hdr" style="margin-top:18px;margin-bottom:8px;">
    <span class="dash-col-title">📅 Follow Up Calendar</span>
  </div>
  <div id="cal-container"></div>`;

  document.getElementById('dash-content').innerHTML=h;
  document.getElementById('cal-container').innerHTML=buildCalendar();

  // persistent event delegation - attached once via global handler
  if(!window._dashClickBound){
    document.addEventListener('click',function(e){
      const card=e.target.closest('[data-recid]');
      if(card)openRec(card.dataset.recid);
    });
    window._dashClickBound=true;
  }

function acCard(r,cls){

  if(!raw)return'';

  return m?m[1].toUpperCase():'';
}

let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function buildCalendar(){
  const y=calYear,m=calMonth;
  const mName=new Date(y,m,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const firstDow=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const prevDim=new Date(y,m,0).getDate();
  const todStr=today();
  const ev={};
  S.records.forEach(r=>{
    if(r.status==='closed')return;
    const f2=FORMATS.find(x=>x.id===r.type);const cm=CATS[r.cat]||{color:'#666',bg:'#f5f5f5'};
    const stuLabel=r.students&&r.students[0]||'';
    const fmtLabel=f2?f2.label:r.type;
    // Collect all follow-up dates (single + array)
    const allDates=[];
    if(r.followUpDate)allDates.push(r.followUpDate);
    if(r.followUpDates&&r.followUpDates.length){
      r.followUpDates.forEach(d=>{if(!allDates.includes(d))allDates.push(d);});
    }
    allDates.forEach(function(fuDate){
      const dm=new Date(fuDate+'T12:00:00');
      if(dm.getFullYear()!==y||dm.getMonth()!==m)return;
      const d=dm.getDate();if(!ev[d])ev[d]=[];
      ev[d].push({id:r.id,label:stuLabel?stuLabel+' ('+fmtLabel+')':fmtLabel,color:cm.color,bg:cm.bg});
    });
  });
  const dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let g=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDowMon=(firstDow+6)%7;
  const tc=Math.ceil((firstDowMon+dim)/7)*7;
  for(let i=0;i<tc;i++){
    let dn,iM=true;
    if(i<firstDowMon){dn=prevDim-(firstDowMon-1)+i;iM=false;}
    else if(i>=firstDowMon+dim){dn=i-(firstDowMon+dim)+1;iM=false;}
    else dn=i-firstDowMon+1;
    const dStr=iM?`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`:'';
    const iT=dStr===todStr;
    const cls='cal-cell'+(iM?'':' other-month')+(iT?' today':'');
    let eh='';
    if(iM&&ev[dn]){ev[dn].slice(0,3).forEach(e=>{eh+=`<span class="cal-event" style="background:${e.bg};color:${e.color};" onclick="openRec('${e.id}')" title="${esc(e.label)}">${e.label.slice(0,22)}</span>`;});if(ev[dn].length>3)eh+=`<span class="cal-more">+${ev[dn].length-3}</span>`;}

}

function skipWeekend(d){
  const day=d.getDay();
  if(day===6)d.setDate(d.getDate()+2);
  else if(day===0)d.setDate(d.getDate()+1);
  return d;
}
function calcFuDates(st){
  const dates=[];
  const base=new Date();
  base.setHours(12,0,0,0);
  for(let i=1;i<=st.times;i++){
    const d=new Date(base);
    if(st.unit==='DAY')d.setDate(d.getDate()+st.every*i);
    else if(st.unit==='WEEK')d.setDate(d.getDate()+st.every*7*i);
    else if(st.unit==='MONTH')d.setMonth(d.getMonth()+st.every*i);
    skipWeekend(d);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

  // Add scheduled follow-up dates
  dates.forEach(function(d,i){

}

function getStuSum(r,fmt){
  // Try fmt.sum function if exists (uses parsed fields stored in raw)
  // Since raw is WhatsApp text, extract key info from it
  if(!r.raw)return '—';
  const raw=r.raw;
  // Extract first meaningful line after student name
  const lines=raw.split('\n').map(function(l){return l.replace(/[*_~]/g,'').trim();}).filter(function(l){return l.length>2;});
  // Skip header lines (all caps, dividers)
  const skip=/[\u2580-\u259F▓▒░▂=─┈﹍﹉]{2,}|^[A-Z][A-Z\s\-]{5,}$|^Reported by:|^Student:/;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(skip.test(l))continue;
    // Skip name line (student name in students array)
    if(r.students&&r.students.some(function(s){return l.toUpperCase().includes(s.toUpperCase());}))continue;
    // Skip date/time lines
    if(/^(Date|Time|Reported|Bathe|Lunch|Mummy|Daddy|Active|Tired|Period|Area|Going back|Pickup|Car plate|Original|New time):/i.test(l))continue;
    // Return first good content line
    const clean=l.replace(/^[-•·\s]+/,'').trim();
    if(clean.length>3)return clean.slice(0,50)+(clean.length>50?'…':'');
  }
  // Fallback: scan for key field lines
  const fieldM=raw.match(/Issue:\s*(.+)|Feeling:\s*(.+)|Temp:\s*(.+)|Request:\s*(.+)|Complaint:\s*(.+)|Item:\s*(.+)/);
  if(fieldM){const v=fieldM.slice(1).find(function(x){return x;});if(v)return v.slice(0,50);}
  return '—';
}

function mGoPage(p){

// ══ PARSER ══
function normL(s){return s.replace(/[\u2980\u007C\*\=\/\\]+/g,' ').replace(/[^\w\s\/]/g,' ').replace(/\s+/g,' ').trim().toUpperCase();}
function isHdr(l){const s=l.replace(/\s/g,'');return(s.match(/[\u2980\|]{2}/g)||[]).length>=2;}
function splitSecs(raw){
  const lines=raw.split('\n');const secs=[];let cur=null;
  for(const l of lines){if(isHdr(l)){const n=normL(l);if(n.includes('PRE INFORMATION')||n.includes('PRE INFO')){if(cur){secs.push(cur);cur=null;}continue;}if(cur)secs.push(cur);cur={header:l,lines:[l]};}else if(cur)cur.lines.push(l);}
  if(cur)secs.push(cur);return secs;
}
function detectFmt(hdr){
  const n=normL(hdr);
  return[...FORMATS].sort((a,b)=>Math.max(...b.kw.map(k=>k.length))-Math.max(...a.kw.map(k=>k.length))).find(f=>f.kw.some(kw=>n.includes(kw.toUpperCase())))||null;
}
function exDate(t){
  let m=t.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);if(m){const d=new Date(+m[3],+m[2]-1,+m[1]);if(!isNaN(d))return d.toISOString().slice(0,10);}
  m=t.match(/(\d{1,2})[\/\-](\d{1,2})\s+(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/i);if(m){const d=new Date(new Date().getFullYear(),+m[2]-1,+m[1]);if(!isNaN(d))return d.toISOString().slice(0,10);}
  return today();
}
function exStus(text){
  const found=new Set();
  S.students.forEach(s=>{if(text.toUpperCase().includes(s.name))found.add(s.name);});
  let m,r=/Student(?:\s+Name)?:\s*([A-Z][A-Z\s&]+?)(?:\n|$)/gi;
  while((m=r.exec(text))!==null){const n=m[1].replace(/[*⚠️\s]+$/,'').trim();if(n.length>2&&n.length<50)found.add(n);}
  r=/\*([A-Z][A-Z]{1,}(?:\s+[A-Z]+){1,4})\*/g;
  const skip=/^(MON|TUE|WED|THU|FRI|SAT|SUN|JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC|SRK|SRT|ATC|OBSERVATION|ACTION TAKEN|INVESTIGATION|RESOLUTION|STAR|HEALTH REPORT|CLASS REPLACEMENT|CHANGE SLOT|BIRTHDAY|LOST ITEM|FOUND ITEM|UNFOUND BOOKS|BEHAVIOUR REPORT|LEARNING REPORT|SPECIAL CARE|PARENT REQUEST|PARENT COMPLAINT|PICKUP|EMOTION|F UP MEDICINE|FORGOT|PRESENT SHARING|LATE HOMEWORK|PENCIL GRIP PROBLEM)$/;
  while((m=r.exec(text))!==null){const n=m[1].trim();if(!skip.test(n))found.add(n);}
  r=/^\d+\.\s+([A-Z][A-Z &\/]{2,35})(?:\s*[-–\n]|$)/gm;
  while((m=r.exec(text))!==null){const n=m[1].replace(/[*]/g,'').trim();if(n.length>3&&!/^(LV\d|JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC|MON|TUE|WED)/.test(n))found.add(n);}
  return[...found].slice(0,15);
}

function genAbsMsg(hdrName,entries){
  const curMo=new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'}).toUpperCase();
  const byMo={};
  entries.forEach(e=>{
    const mo=(e.month||'').toUpperCase()||
      (e.date?new Date(e.date+'T12:00:00').toLocaleDateString('en-GB',{month:'long',year:'numeric'}).toUpperCase():curMo);
    (byMo[mo]=byMo[mo]||[]).push(e);
  });
  const curKeys=Object.keys(byMo).filter(k=>k===curMo);
  const futKeys=Object.keys(byMo).filter(k=>k!==curMo);
  let m=H(hdrName,'\uD83D\uDCCB');
  curKeys.forEach(mo=>{
    m+=`\n\n${BD(mo)}`;let n=0;
    const byDate={};byMo[mo].forEach(e=>{(byDate[e.date||'_']=byDate[e.date||'_']||[]).push(e);});
    Object.keys(byDate).sort().forEach(dt=>{
      if(dt!=='_')m+=`\n\n${BD(fd(dt))} ${dayN(dt)}`;
      byDate[dt].forEach(e=>{m+=`\n\n${++n}. ${BD(e.name||e.tc||'')}`;if(e.leave)m+=`\n- ${e.leave}`;if(e.reason&&!e.leave)m+=`\n- ${e.reason}`;if(e.range)m+=`\n- MC: ${e.range}`;if(e.reason&&e.leave)m+=`\n  ${e.reason}`;});
    });
  });
  if(futKeys.length){
    m+=`\n\n${DIV}\t\n${H('Pre Information','\u23F0')}\n===============`;
    futKeys.forEach(mo=>{
      m+=`\n\n${BD('///// '+mo+' /////')}`;let n=0;
      const byDate={};byMo[mo].forEach(e=>{(byDate[e.date||'_']=byDate[e.date||'_']||[]).push(e);});
      Object.keys(byDate).sort().forEach(dt=>{
        if(dt!=='_')m+=`\n\n${BD(fd(dt))} ${dayN(dt)}`;
        byDate[dt].forEach(e=>{m+=`\n\n${++n}. ${BD(e.name||e.tc||'')}`;if(e.leave)m+=`\n- ${e.leave}`;if(e.reason&&!e.leave)m+=`\n- ${e.reason}`;if(e.range)m+=`\n- MC: ${e.range}`;});
      });
    });
  }
  return m;
}

let mRepCat='ALL';
function renderMgmtReport(cat){
  if(cat!==undefined)mRepCat=cat;else cat=mRepCat;
  const el=document.getElementById('mreport-content')||document.getElementById('mp-mreport');
  if(!el)return;
  const SKIP=['Attendance','Schedule','Events'];
  // Tabs
  let tabs='<div class="tab-strip">';
  tabs+='<button class="xtab '+(cat==='ALL'?'on':'')+'" onclick="renderMgmtReport(\'ALL\')">All</button>';
  Object.keys(CATS).forEach(function(ct){
    if(SKIP.includes(ct))return;
    if(!FORMATS.some(function(f){return f.cat===ct;}))return;
    var cm=CATS[ct];
    tabs+='<button class="xtab '+(cat===ct?'on':'')+'" onclick="renderMgmtReport(\''+ct+'\')">'+(cm?cm.icon+' ':'')+ct+'</button>';
  });
  tabs+='</div>';
  // Formats
  var show=FORMATS.filter(function(f){
    if(cat!=='ALL'&&f.cat!==cat)return false;
    if(SKIP.includes(f.cat)&&f.dk)return false;
    return true;
  });
  var body='';
  var prevCat='';
  show.forEach(function(f){
    var cm=CATS[f.cat];if(!cm)return;
    if(cat==='ALL'&&f.cat!==prevCat){
      body+='<div style="font-size:11px;font-weight:700;color:'+cm.color+';text-transform:uppercase;letter-spacing:.08em;padding:14px 0 8px;border-bottom:.5px solid var(--bdr);margin-bottom:10px;">'+cm.icon+' '+f.cat+'</div>';
      prevCat=f.cat;
    }
    if(f.dk){
      var cnt=(S.drafts[f.dk]||[]).length;
      var bg=cnt>0?cm.bg:'var(--sur2)';var col=cnt>0?cm.color:'var(--mut)';
      var lbl=cnt>0?(cnt+' pending'):'Outbox';
      body+='<div class="fmt-card" onclick="mGoPage(\'drafts\')">'
        +'<div class="fmt-ico" style="background:'+cm.bg+'">'+f.icon+'</div>'
        +'<div class="fmt-info"><div class="fmt-name">'+f.label+'</div><div class="fmt-desc">Outbox accumulator · tap to add</div></div>'
        +'<div style="font-size:11px;font-weight:600;background:'+bg+';color:'+col+';padding:3px 9px;border-radius:12px;">'+lbl+'</div>'
        +'</div>';
    }else{
      body+='<div class="fmt-card" onclick="openForm(\''+f.id+'\',\'mgmt\')">'
        +'<div class="fmt-ico" style="background:'+cm.bg+'">'+f.icon+'</div>'
        +'<div class="fmt-info"><div class="fmt-name">'+f.label+'</div><div class="fmt-desc">'+f.desc+'</div></div>'
        +'<span style="color:var(--mut);font-size:18px;">›</span>'
        +'</div>';
    }
  });
  if(el.id==='mp-mreport')el.innerHTML='<div style="padding:16px 14px 24px;">'+tabs+'<div style="padding:14px 0 24px;">'+body+'</div></div>';else el.innerHTML=tabs+'<div style="padding:14px 14px 24px;">'+body+'</div>';

let outboxCat='ALL';

    {cat:'Attendance',keys:['TC_ABS','SRK_ABS','ATC_ABS','SRT_ABS']},
    {cat:'Schedule',  keys:['REPLACEMENT','CHANGE_SLOT']},
    {cat:'Events',    keys:['BIRTHDAY']},
  ];
  const filtered=cat==='ALL'?groupOrder:groupOrder.filter(g=>g.cat===cat);

  // Build tabs
  let tabs=`<div class="tab-strip">`;
  tabs+=`<button class="xtab ${cat==='ALL'?'on':''}" onclick="renderDrafts('ALL')">All</button>`;
  groupOrder.forEach(g=>{
    const cm=CATS[g.cat]||{icon:'•',color:'#666',bg:'#f5f5f5'};
    const total=g.keys.reduce((s,k)=>s+(S.drafts[k]||[]).length,0);

    keys.forEach(key=>{

      h+=`<div class="draft-card" id="dc-${key}">

            `<div id="del-${key}">${renderDraftEntries(key,entries)}</div>`}

            <button class="btn btn-sm" onclick="openAddDraft('${key}')">+ Add Entry</button>

          </div>

    });

  return entries.map((e,i)=>{
    const lbl=DRAFT_CFG[key].entryLabel(e);
    const ds=e.date?fds(e.date):(e.month?e.month.split(' ')[0].slice(0,3):'');

      <div class="draft-entry-date">${esc(ds)}</div>

      <button class="draft-del" onclick="removeDraftEntry('${key}',${i})">×</button>
    </div>`;
  }).join('');
}

    fh+=`<div class="frow"><label style="font-size:12px;font-weight:600;color:var(--txt2);display:block;margin-bottom:5px;">${f.label}${f.req?'<span style="color:var(--red);"> *</span>':''}</label>`;
    if(f.type==='date'){
      fh+=`<input type="date" id="da_${f.id}" value="${today()}" style="width:100%;border:.5px solid var(--bdr);border-radius:var(--rs);padding:11px 12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--txt);background:var(--sur);outline:none;">`;
    }else{
      fh+=`<input type="text" id="da_${f.id}" value="" placeholder="${esc(f.ph||'')}" ${f.upper?'oninput="this.value=this.value.toUpperCase()"':''} style="width:100%;border:.5px solid var(--bdr);border-radius:var(--rs);padding:11px 12px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--txt);background:var(--sur);outline:none;">`;
    }
    fh+=`</div>`;
  });
  openModal(`+ Add — ${cfg.label}`,fh,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn btn-grn" onclick="submitDraftEntry('${key}')">Add Entry</button>`
  );
}

function submitDraftEntry(key){
  const cfg=DRAFT_CFG[key];const entry={id:'de_'+Date.now()};
  for(const f of cfg.addFields){
    const el=document.getElementById('da_'+f.id);if(!el)continue;
    const v=el.value.trim();
    if(f.req&&!v){toast('Required: '+f.label,true);return;}
    entry[f.id]=v;
  }
  if(!S.drafts[key])S.drafts[key]=[];
  S.drafts[key].push(entry);save();closeModal();
  renderDrafts();
  setTimeout(()=>{const b=document.getElementById('db-'+key);const a=document.getElementById('da-'+key);if(b&&!b.classList.contains('on')){b.classList.add('on');a.textContent='\u2304';}},50);
  toast('Added to '+cfg.label+' draft');
  renderDash();
}

function removeDraftEntry(key,idx){
  S.drafts[key].splice(idx,1);save();renderDrafts();renderDash();
  setTimeout(()=>{const b=document.getElementById('db-'+key);const a=document.getElementById('da-'+key);if(b&&!b.classList.contains('on')){b.classList.add('on');a.textContent='\u2304';}},50);
}

function clearDraft(key){
  if(!confirm('Clear all entries from '+DRAFT_CFG[key].label+' draft?'))return;
  S.drafts[key]=[];save();renderDrafts();renderDash();toast('Draft cleared');
}

function genDraft(key){
  const entries=S.drafts[key]||[];if(!entries.length){toast('No entries yet',true);return;}
  const cfg=DRAFT_CFG[key];const msg=cfg.gen(entries);
  window._dMsg=msg;window._dKey=key;
  openModal(`Preview \u2014 ${cfg.label}`,
    `<div style="font-size:11px;color:var(--mut);margin-bottom:8px;">${entries.length} entr${entries.length>1?'ies':'y'} \u00b7 Review then send</div>
     <div style="font-family:'DM Mono',monospace;font-size:12px;line-height:1.85;white-space:pre-wrap;color:var(--txt);background:#f8fafc;border:.5px solid var(--bdr);border-radius:8px;padding:12px;max-height:55vh;overflow-y:auto;">${esc(msg)}</div>`,
    `<button class="btn btn-sm" onclick="navigator.clipboard.writeText(window._dMsg||'').then(()=>toast('Copied!')).catch(()=>toast('Failed',true))">Copy</button>
     <button class="btn btn-grn btn-sm" onclick="sendDraftWA()">Send to WhatsApp</button>`
  );
}

function sendDraftWA(){
  if(!window._dMsg)return;
  const enc=encodeURIComponent(window._dMsg);
  window.location.href='whatsapp://send?text='+enc;
  setTimeout(()=>window.open('https://wa.me/?text='+enc,'_blank'),1500);
  closeModal();
  setTimeout(()=>{
    openModal('\u2713 Sent \u2014 Clear Draft?',
      `<div style="text-align:center;padding:8px 0;">
        <div style="font-size:40px;margin-bottom:10px;">\u2705</div>
        <div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px;">Message sent to WhatsApp</div>
        <div style="font-size:12px;color:var(--mut);">Do you want to clear the draft now?</div>
      </div>`,
      `<button class="btn btn-sm" onclick="closeModal()">Keep Draft</button>
       <button class="btn btn-red btn-sm" onclick="S.drafts[window._dKey]=[];save();closeModal();renderDrafts();renderDash();toast('Draft cleared');">Clear Draft</button>`
    );
  },2000);
}


// ══ INIT ══
loadS();
document.getElementById('entry-ini').value=getIni();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
